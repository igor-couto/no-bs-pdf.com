name: CI/CD - no-bs-pdf

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "LICENSE.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/no-bs-pdf
  IMAGE_TAG: ${{ github.sha }}
  HOST_PORT: 50161
  CONTAINER_PORT: 80
  SMOKE_PORT: 60161

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check app.min.js
          [ -f .claude/serve.mjs ] && node --check .claude/serve.mjs || echo "serve.mjs not committed; skipping"

      - name: Verify minified app is current
        run: |
          npx --yes terser@5 app.js --compress --mangle --format ascii_only=true,comments=false -o /tmp/app.min.js
          cmp -s /tmp/app.min.js app.min.js || {
            echo "::error::app.min.js is stale. Run: npx --yes terser@5 app.js --compress --mangle --format ascii_only=true,comments=false -o app.min.js"
            exit 1
          }

      - name: Verify minified styles are current
        run: |
          npx --yes clean-css-cli@5 styles.css -o /tmp/styles.min.css
          cmp -s /tmp/styles.min.css styles.min.css || {
            echo "::error::styles.min.css is stale. Run: npx --yes clean-css-cli@5 styles.css -o styles.min.css"
            exit 1
          }

      - name: Validate JSON (manifest)
        run: node -e "JSON.parse(require('fs').readFileSync('site.webmanifest','utf8'))"

      - name: Ensure vendored libraries are present
        run: |
          set -e
          for f in vendor/pdf.min.js vendor/pdf.worker.min.js vendor/pdf-lib.min.js; do
            test -s "$f" || { echo "Missing or empty: $f"; exit 1; }
          done
          echo "All vendored libraries present."

      - name: Warn if placeholder domain is still set
        run: |
          if grep -rqs "no-bs-pdf.com" index.html robots.txt sitemap.xml; then
            echo "::warning::Placeholder domain 'no-bs-pdf.com' is still present — set your real domain before relying on canonical/OG/sitemap for SEO."
          fi

  docker_image:
    name: Build and Push Docker Image
    needs: validate
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image (ARM64)
        env:
          DOCKER_BUILDKIT: 1
        run: |
          sudo docker build \
            --platform linux/arm64 \
            -f Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            --push \
            .

  deploy:
    name: Deploy to Server
    needs: docker_image
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          SSH_PORT=${SSH_PORT:-22}
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
        shell: bash

      - name: Pull and run container on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          SSH_PORT=${SSH_PORT:-22}

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_ROOT='/home/$SSH_USER/apps/no-bs-pdf' IMAGE='${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}' CONTAINER_NAME='no-bs-pdf' HOST_PORT='${{ env.HOST_PORT }}' CONTAINER_PORT='${{ env.CONTAINER_PORT }}' SMOKE_PORT='${{ env.SMOKE_PORT }}' GHCR_USER='${{ github.actor }}' bash -s" <<'REMOTE'
          set -euo pipefail

          CANDIDATE_NAME="${CONTAINER_NAME}-candidate"

          wait_for_http() {
            local url="$1"
            for attempt in $(seq 1 30); do
              if command -v curl >/dev/null 2>&1; then
                curl -fsS --max-time 5 "$url" >/dev/null && return 0
              elif command -v wget >/dev/null 2>&1; then
                wget -q --timeout=5 --tries=1 -O /dev/null "$url" && return 0
              else
                echo "curl or wget is required for deploy health checks."
                return 1
              fi
              sleep 2
            done
            return 1
          }

          cleanup_candidate() {
            sudo docker rm -f "$CANDIDATE_NAME" >/dev/null 2>&1 || true
          }

          run_app() {
            local name="$1"
            local port="$2"
            local image="$3"
            local restart_policy="$4"

            sudo docker run -d \
              --name "$name" \
              --restart="$restart_policy" \
              -p "127.0.0.1:${port}:${CONTAINER_PORT}" \
              "$image"
          }

          mkdir -p "$APP_ROOT"

          echo "Logging in to GHCR..."
          echo '${{ secrets.GITHUB_TOKEN }}' | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin

          echo "Pulling image ${IMAGE}..."
          sudo docker pull "$IMAGE"

          echo "Smoke-testing candidate container..."
          cleanup_candidate
          trap cleanup_candidate EXIT
          run_app "$CANDIDATE_NAME" "$SMOKE_PORT" "$IMAGE" "no"
          if ! wait_for_http "http://127.0.0.1:${SMOKE_PORT}/"; then
            sudo docker logs "$CANDIDATE_NAME" || true
            exit 1
          fi
          for asset_path in /buy-me-a-coffe.svg /kofi.svg; do
            if ! wait_for_http "http://127.0.0.1:${SMOKE_PORT}${asset_path}"; then
              echo "Candidate is missing required asset: ${asset_path}"
              sudo docker logs "$CANDIDATE_NAME" || true
              exit 1
            fi
          done
          cleanup_candidate
          trap - EXIT

          PREVIOUS_IMAGE="$(sudo docker inspect --format='{{.Config.Image}}' "$CONTAINER_NAME" 2>/dev/null || true)"

          echo "Replacing production container..."
          sudo docker rm -f "$CONTAINER_NAME" || true
          run_app "$CONTAINER_NAME" "$HOST_PORT" "$IMAGE" "always"

          if ! wait_for_http "http://127.0.0.1:${HOST_PORT}/"; then
            sudo docker logs "$CONTAINER_NAME" || true

            if [ -n "$PREVIOUS_IMAGE" ]; then
              echo "New container failed health check. Rolling back to ${PREVIOUS_IMAGE}..."
              sudo docker rm -f "$CONTAINER_NAME" || true
              run_app "$CONTAINER_NAME" "$HOST_PORT" "$PREVIOUS_IMAGE" "always"
            fi

            exit 1
          fi

          echo "Pruning dangling images..."
          sudo docker image prune -f >/dev/null 2>&1 || true

          echo "Deployment completed successfully."
          REMOTE
        shell: bash
