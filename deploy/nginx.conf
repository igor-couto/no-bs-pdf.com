# Server block for no-bs-pdf (static site).
# Note: locations below use `expires` (not `add_header`) for caching, so the
# server-level `add_header`s are still inherited into every location (nginx
# drops inherited add_headers only when a location adds its own).

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/manifest+json application/xml;

    # --- Security headers (inherited by all locations; `always` covers errors too) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Prevent CDN/proxy HTML rewrites. Cloudflare respects `no-transform` by not
    # injecting JavaScript Detections, which would otherwise violate this CSP.
    add_header Cache-Control "no-transform" always;
    # The app is fully self-contained: scripts/styles from 'self', a blob: worker,
    # data:/blob: images (stamped pictures + canvas). No third-party origins.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'" always;

    # Correct MIME type for the web manifest (some mime.types maps omit it).
    location = /site.webmanifest {
        default_type application/manifest+json;
        expires 1y;
    }

    # Static assets are URL-versioned by index.html/app.js, so they can be cached hard.
    # `^~` beats the regex rule below.
    location ^~ /vendor/ {
        expires 1y;
        access_log off;
    }

    # Other static assets.
    location ~* \.(css|js|svg|png|jpe?g|ico)$ {
        expires 1y;
    }

    # Entry point and crawl files — always revalidate so updates show immediately.
    location = / { expires -1; try_files /index.html =404; }
    location = /index.html { expires -1; }
    location = /robots.txt { expires -1; }
    location = /sitemap.xml { expires -1; }

    # Serve real files; return a real 404 for anything unknown (no soft-404s).
    location / {
        try_files $uri $uri/ =404;
    }
}
